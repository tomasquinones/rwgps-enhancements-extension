<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #424242;
    }
    .group {
      margin-bottom: 4px;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 600;
      color: #5b6161;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .group-header:hover {
      color: #1b2828;
    }
    .group-arrow {
      display: inline-block;
      font-size: 9px;
      transition: transform 0.15s ease;
      color: #999;
    }
    .group.collapsed .group-arrow {
      transform: rotate(-90deg);
    }
    .group.collapsed .group-body {
      display: none;
    }
    .group-body {
      padding-left: 4px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
    }
    .group-body label:not(:first-of-type) {
      border-top: 1px solid #eee;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #f57c00;
      cursor: pointer;
    }
    .about {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 11px;
      line-height: 1.4;
      color: #888;
    }
    .version {
      font-size: 11px;
      color: #999;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 6px;
    }
    .email-icon {
      color: #999;
      text-decoration: none;
      font-size: 26px;
      line-height: 1;
    }
    .email-icon:hover {
      color: #f56200;
    }
  </style>
</head>
<body>
  <h3>RWGPS Enhancements</h3>

  <div class="group" data-group="dashboard">
    <div class="group-header"><span class="group-arrow">&#9660;</span> Dashboard</div>
    <div class="group-body">
      <label>
        <input type="checkbox" id="streaks" checked>
        Streaks
      </label>
      <label>
        <input type="checkbox" id="statsCharts" checked>
        Stats Charts
      </label>
      <label>
        <input type="checkbox" id="calendarStreak" checked>
        Calendar Streak Highlights
      </label>
      <label>
        <input type="checkbox" id="calendarGoals" checked>
        Calendar Goal Indicators
      </label>
    </div>
  </div>

  <div class="group" data-group="goals">
    <div class="group-header"><span class="group-arrow">&#9660;</span> Goals</div>
    <div class="group-body">
      <label>
        <input type="checkbox" id="goals" checked>
        Goal Charts &amp; Past Goals Listing
      </label>
    </div>
  </div>

  <div class="group" data-group="activities">
    <div class="group-header"><span class="group-arrow">&#9660;</span> Activities &amp; Routes</div>
    <div class="group-body">
      <label>
        <input type="checkbox" id="climbs" checked>
        Climb Highlighter
      </label>
      <label>
        <input type="checkbox" id="descents" checked>
        Descent Highlighter
      </label>
      <label>
        <input type="checkbox" id="segments" checked>
        Segment Highlighter
      </label>
      <label>
        <input type="checkbox" id="speedColors" checked>
        Speed Color Highlighter
      </label>
      <label>
        <input type="checkbox" id="gradeColors" checked>
        Grade Color Highlighter
      </label>
      <label>
        <input type="checkbox" id="quickLaps" checked>
        Quick Laps
      </label>
      <label>
        <input type="checkbox" id="travelDirection" checked>
        Travel Direction
      </label>
      <label>
        <input type="checkbox" id="daylight" checked>
        Daylight Graph
      </label>
      <label>
        <input type="checkbox" id="weather" checked>
        Weather Prediction &amp; History
      </label>
      <label>
        <input type="checkbox" id="hrZones" checked>
        HR Zones
      </label>
      <label>
        <input type="checkbox" id="sampleTime" checked>
        Sample Time
      </label>
      <label>
        <input type="checkbox" id="etSampleTime" checked>
        ET Sample Time
      </label>
      <label>
        <input type="checkbox" id="hillshade" checked>
        Hill Shading
      </label>
    </div>
  </div>

  <div class="group" data-group="layers">
    <div class="group-header"><span class="group-arrow">&#9660;</span> Layers</div>
    <div class="group-body">
      <label>
        <input type="checkbox" id="publicLands" checked>
        Public Lands
      </label>
      <label>
        <input type="checkbox" id="radar" checked>
        Weather Radar
      </label>
      <label>
        <input type="checkbox" id="wildfire" checked>
        Wildfires
      </label>
    </div>
  </div>

  <div class="group" data-group="heatmaps">
    <div class="group-header"><span class="group-arrow">&#9660;</span> Heatmaps</div>
    <div class="group-body">
      <label>
        <input type="checkbox" id="heatmapColors" checked>
        Heatmap Colors
      </label>
    </div>
  </div>

  <div class="about">Unofficial enhancements for your RideWithGPS.com account. If these features ever make it to production they will be removed from the extension. &mdash;Tomas Quinones</div>
  <div class="footer">
    <a href="mailto:rwgps.enhancements@tomasquinones.com" title="Send feedback" class="email-icon">&#9993;</a>
    <div class="version">v20260508a</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
